name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal deps
        run: pip install httpx pandas pyarrow tenacity "prefect>=3.0" pytest ruff
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest tests/ -v

  dbt:
    name: dbt parse
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt-duckdb
        run: pip install "dbt-core>=1.8" "dbt-duckdb>=1.8"
      - name: Set up profile
        run: |
          mkdir -p $HOME/.dbt
          cat > $HOME/.dbt/profiles.yml <<'EOF'
          air_quality:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ../ci.duckdb
                threads: 2
                external_root: ..
          EOF
      - name: dbt deps
        run: dbt deps
      - name: dbt parse
        run: dbt parse

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check
