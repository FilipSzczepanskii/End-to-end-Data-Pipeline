version: 2

sources:
  - name: raw
    description: "Parquet landing zone written by the Prefect ingest flows."
    meta:
      external_location: "../data/{name}/**/*.parquet"
    tables:
      - name: stations
        description: "GIOS monitoring stations. Daily snapshot."
        columns:
          - name: station_id
            tests: [not_null]
          - name: station_name
            tests: [not_null]
          - name: latitude
          - name: longitude

      - name: sensors
        description: "Sensors attached to stations. One sensor per pollutant per station."
        columns:
          - name: sensor_id
            tests: [not_null]

      - name: measurements
        description: "Hourly readings per sensor."
        columns:
          - name: sensor_id
            tests: [not_null]
          - name: measured_at
            tests: [not_null]
