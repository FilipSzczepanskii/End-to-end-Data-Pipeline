name: air_quality
version: "1.0.0"
config-version: 2

profile: air_quality

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  air_quality:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

vars:
  who_pm25_24h_limit: 15 # WHO 2021 guideline, ug/m3, 24h
  who_pm10_24h_limit: 45
  who_no2_24h_limit: 25
